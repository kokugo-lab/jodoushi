<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Maru+Gothic:wght@500;700&display=swap">
<title>紅葉の姫と学ぶ 重要助動詞</title>
<style>

:root{
  --beni:#B3241C; --hi:#E8442E; --kuro:#221010; --kinari:#FBF4EA;
  --kin:#D9A441; --take:#3E7A4E; --sora:#5B87B8;
  --mincho:'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho','MS PMincho',serif;
  --maru:'Zen Maru Gothic','Hiragino Maru Gothic ProN','Yu Gothic',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:#B3241C}
html,body{height:100%}
#app{opacity:0}
#app.ready{opacity:1;transition:opacity .8s ease-out}

body{font-family:var(--maru);background:var(--beni);color:var(--kuro);overflow:hidden;position:fixed;inset:0}
.shippou{
  background-color:var(--beni);
  background-image:
    radial-gradient(circle at 100% 100%, transparent 44%, rgba(255,235,220,.10) 45%, rgba(255,235,220,.10) 49%, transparent 50%),
    radial-gradient(circle at 0% 100%,   transparent 44%, rgba(255,235,220,.10) 45%, rgba(255,235,220,.10) 49%, transparent 50%),
    radial-gradient(circle at 100% 0%,   transparent 44%, rgba(255,235,220,.10) 45%, rgba(255,235,220,.10) 49%, transparent 50%),
    radial-gradient(circle at 0% 0%,     transparent 44%, rgba(255,235,220,.10) 45%, rgba(255,235,220,.10) 49%, transparent 50%),
    linear-gradient(160deg, #C22A1E 0%, #A81E14 55%, #8E1710 100%);
  background-size:72px 72px,72px 72px,72px 72px,72px 72px,100% 100%;
}
#app{height:100%;position:relative}
.screen{position:absolute;inset:0;display:none;flex-direction:column}
.screen.on{display:flex}

/* ===== タイトル ===== */
#scr-title{align-items:center;justify-content:center;overflow:hidden}
.t-band{position:absolute;top:0;bottom:0;width:14%;background:rgba(232,68,46,.35);pointer-events:none}
.t-band.b1{left:6%}.t-band.b2{right:8%;background:rgba(140,20,12,.35)}
#title-hime{
  position:absolute;bottom:0;left:34%;transform:translateX(-50%);
  height:72%;filter:drop-shadow(0 10px 30px rgba(60,0,0,.5));
  border-radius:6px;animation:breathe 4.5s ease-in-out infinite;
}
#title-nagi{
  position:absolute;bottom:0;left:72%;transform:translateX(-50%);
  height:62%;filter:drop-shadow(0 10px 30px rgba(60,0,0,.5));
  border-radius:6px;animation:breathe 5.2s ease-in-out .8s infinite;
}
.t-vtxt{
  writing-mode:vertical-rl;font-family:var(--mincho);font-weight:700;color:#fff;
  letter-spacing:.35em;text-shadow:0 2px 14px rgba(90,0,0,.6);position:absolute;z-index:2;
}
#t-main{right:5%;top:6%;font-size:clamp(26px,6vh,52px)}
#t-sub{left:8.5%;bottom:8%;font-size:clamp(14px,2.8vh,22px);opacity:.92}
#t-quote{left:19%;top:5%;font-size:clamp(11px,2vh,15px);opacity:.75;letter-spacing:.5em}
#t-tag{
  writing-mode:vertical-rl;font-family:var(--mincho);font-weight:700;
  color:#fff;letter-spacing:.28em;
  text-shadow:0 2px 14px rgba(90,0,0,.6);
  position:absolute;z-index:2;
  right:15%;top:6%;font-size:clamp(12px,2.2vh,16px);opacity:.9;
}
#t-menu{position:absolute;bottom:5%;right:5%;z-index:3;display:flex;flex-direction:column;gap:13px}
.t-btn{
  font-family:var(--mincho);font-weight:700;font-size:18px;letter-spacing:.3em;
  padding:13px 28px 13px 32px;border:none;border-radius:14px;cursor:pointer;
  background:var(--kinari);color:var(--beni);box-shadow:0 4px 0 rgba(90,0,0,.45);transition:transform .12s;
}
.t-btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(90,0,0,.45)}
.t-btn small{display:block;font-size:11px;letter-spacing:.15em;color:#9c6b1f;font-family:var(--maru)}


.leaf{position:absolute;top:-6%;z-index:1;font-size:20px;opacity:.55;pointer-events:none;animation:leaffall linear infinite}
@keyframes leaffall{
  0%{transform:translateY(-4vh) translateX(0) rotate(0deg)}
  100%{transform:translateY(110vh) translateX(6vw) rotate(340deg)}
}
@media (prefers-reduced-motion: reduce){.leaf{display:none}}

/* ===== 選択画面 ===== */
.menu-wrap{flex:1;overflow-y:auto;padding:22px 18px 40px;-webkit-overflow-scrolling:touch}
.menu-head{font-family:var(--mincho);color:#fff;text-align:center;font-size:22px;letter-spacing:.4em;font-weight:700;margin:10px 0 4px}
.menu-note{color:#ffd9c9;text-align:center;font-size:12px;margin-bottom:18px}
.jo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;max-width:720px;margin:0 auto}
.jo-card{
  background:var(--kinari);border-radius:16px;padding:14px 12px;cursor:pointer;border:none;text-align:left;
  box-shadow:0 3px 0 rgba(90,0,0,.4);transition:transform .12s;position:relative;overflow:hidden;
}
.jo-card:active{transform:translateY(2px)}
.jo-card .jn{font-family:var(--mincho);font-size:26px;font-weight:700;color:var(--beni)}
.jo-card .ji{font-size:11.5px;color:#7a5a3a;margin-top:4px;line-height:1.5}
.jo-card .done{position:absolute;top:8px;right:10px;font-size:15px;color:var(--take)}
.back-btn{
  position:absolute;top:12px;left:12px;z-index:8;background:rgba(0,0,0,.28);color:#fff;
  border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:7px 16px;font-size:13px;cursor:pointer;font-family:var(--maru);
}

/* ===== ステージ・立ち絵 ===== */
.stage{flex:1;position:relative;overflow:hidden}
.ch{
  position:absolute;bottom:0;transform:translateX(-50%);transform-origin:50% 100%;
  filter:drop-shadow(0 8px 22px rgba(60,0,0,.45));border-radius:4px;
  transition:filter .35s;will-change:transform;pointer-events:none;
}
.ch.hime{left:30%;height:min(68%,540px)}
#scr-quiz .ch.hime{height:min(54%,430px)}
.ch.nagi{left:73%;height:min(58%,470px)}
#scr-quiz .ch.nagi{height:min(47%,370px)}
/* PCでは試しの間の立ち絵を学びの間と同じ大きさに */
@media (min-width:760px){
  #scr-quiz .ch.hime{height:min(68%,540px)}
  #scr-quiz .ch.nagi{height:min(58%,470px)}
  /* 現代語訳の選択肢も他と同じ2×2レイアウトに（優先度を上げて確実に適用） */
  #scr-quiz #q-panel #q-choices.wide{grid-template-columns:1fr 1fr}
  #scr-quiz #q-panel #q-choices.wide .q-btn{text-align:center}
}
.ch.dim{filter:brightness(.62) saturate(.8) drop-shadow(0 8px 22px rgba(60,0,0,.45))}
.ch-idle{animation:breathe 4.2s ease-in-out infinite}
.ch-talk{animation:talkbob .5s ease-in-out 2}
.ch-joy{animation:joyhop .55s cubic-bezier(.3,1.6,.5,1) 2}
.ch-oops{animation:oops .6s ease-in-out 1}
.ch-enter{animation:enter .7s ease-out 1}
@keyframes breathe{0%,100%{transform:translateX(-50%) translateY(0) rotate(0deg) scale(1)}50%{transform:translateX(-50%) translateY(-7px) rotate(.5deg) scale(1.008)}}
@keyframes talkbob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-9px)}}
@keyframes joyhop{0%,100%{transform:translateX(-50%) translateY(0) rotate(0)}40%{transform:translateX(-50%) translateY(-26px) rotate(-1.5deg)}70%{transform:translateX(-50%) translateY(-6px) rotate(1deg)}}
@keyframes oops{0%,100%{transform:translateX(-50%) rotate(0)}25%{transform:translateX(calc(-50% - 8px)) rotate(-1.2deg)}75%{transform:translateX(calc(-50% + 8px)) rotate(1.2deg)}}
@keyframes enter{from{transform:translateX(-50%) translateY(40px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@media (prefers-reduced-motion: reduce){.ch-idle,.ch-talk,.ch-joy,.ch-oops,.ch-enter,#title-hime,#title-nagi{animation:none !important}}

/* 巻物カード */
#card{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:min(94%,640px);max-height:56%;overflow-y:auto;
  background:var(--kinari);border-radius:16px;border-top:5px solid var(--kin);border-bottom:5px solid var(--kin);
  box-shadow:0 8px 24px rgba(60,0,0,.5);padding:14px 16px;z-index:4;display:none;
  -webkit-overflow-scrolling:touch;
}
#card.on{display:block;animation:cardin .35s ease-out}
@keyframes cardin{from{opacity:0;transform:translateX(-50%) translateY(-14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.card-title{
  font-family:var(--mincho);font-weight:700;color:var(--beni);font-size:16px;letter-spacing:.2em;
  margin-bottom:8px;border-left:5px solid var(--beni);padding-left:9px;
}
table.katsu{width:100%;border-collapse:collapse;font-size:13.5px}
table.katsu th{background:var(--beni);color:#fff;font-family:var(--mincho);font-weight:600;padding:6px 2px;font-size:12px;letter-spacing:.1em}
table.katsu td{border:1px solid #d8c4a8;text-align:center;padding:8px 2px;font-family:var(--mincho);font-weight:700;font-size:16px;color:#40241a;background:#fffdf8}
table.katsu td .sub{display:block;font-size:12.5px;color:var(--hi);font-weight:600}
.imi-list{list-style:none;display:flex;flex-wrap:wrap;gap:8px}
.imi-list li{background:#fff;border:1.5px solid var(--kin);border-radius:4px;padding:6px 10px;font-size:13.5px;line-height:1.4}
.imi-list li b{color:var(--beni);font-family:var(--mincho);font-size:15px;margin-right:5px}
.rei{background:#fff;border-radius:6px;padding:10px 12px;border:1.5px dashed var(--kin)}
.rei .kobun{font-family:var(--mincho);font-size:17px;font-weight:700;color:#40241a;line-height:1.7}
.rei .kobun u{text-decoration:none;border-bottom:3px solid var(--hi);padding-bottom:1px}
.rei .yaku{font-size:13px;color:#7a5a3a;margin-top:5px}
.rei + .rei{margin-top:8px}
.setsu-big{font-family:var(--mincho);font-size:22px;font-weight:700;color:var(--beni);text-align:center;padding:10px;background:#fff;border-radius:12px;border:2px solid var(--kin)}
.setsu-big small{display:block;font-size:12px;color:#7a5a3a;font-family:var(--maru);font-weight:500;margin-top:4px}

/* 会話ボックス */
#dlg{
  position:relative;z-index:6;margin:0 8px 8px;padding:14px 16px 24px;min-height:132px;
  background:linear-gradient(#FBF4EA,#F3E6D2);border-radius:18px;border:2px solid var(--kin);
  box-shadow:0 -6px 24px rgba(60,0,0,.45);cursor:pointer;
}
#dlg-name{
  position:absolute;top:-16px;left:14px;background:var(--beni);color:#fff;font-family:var(--mincho);
  font-weight:700;font-size:14px;letter-spacing:.25em;padding:5px 16px;border-radius:12px;border:1.5px solid var(--kin);
  transition:background .2s;
}
#dlg-name.nagi{background:var(--sora)}
#dlg-face{
  position:absolute;top:-34px;right:12px;width:64px;height:64px;border-radius:50%;
  border:3px solid var(--kin);box-shadow:0 3px 10px rgba(60,0,0,.4);object-fit:cover;background:#fff;
}
#dlg-text{font-size:15.5px;line-height:1.85;padding-top:8px;color:#33201a;font-weight:500;min-height:60px}
#dlg-text b{color:var(--beni)}
#dlg-next{position:absolute;right:16px;bottom:8px;color:var(--beni);font-size:15px;animation:blinknext 1s ease-in-out infinite}
@keyframes blinknext{0%,100%{opacity:1;transform:translateY(0)}50%{opacity:.25;transform:translateY(3px)}}
.progress{position:absolute;left:16px;bottom:9px;font-size:11px;color:#a3805a;letter-spacing:.1em}

/* クイズ */
#q-card{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:min(94%,620px);z-index:4;background:var(--kinari);border-radius:16px;
  border-top:5px solid var(--kin);border-bottom:5px solid var(--kin);
  box-shadow:0 8px 24px rgba(60,0,0,.5);padding:12px 16px;
  max-height:38%;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
#q-panel{
  position:relative;z-index:6;margin:0 8px 8px;padding:12px 14px;
  background:linear-gradient(#FBF4EA,#F3E6D2);border-radius:18px;border:2px solid var(--kin);
  box-shadow:0 -6px 24px rgba(60,0,0,.45);
  max-height:48%;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
#q-no{font-size:12px;color:#9c6b1f;letter-spacing:.2em;margin-bottom:6px;font-weight:700}
#q-text{font-size:15px;line-height:1.8;font-weight:700;color:#33201a}
#q-text .kobun{display:block;font-family:var(--mincho);font-size:19px;margin:8px 0 4px;color:#40241a}
#q-text u{text-decoration:none;border-bottom:3.5px solid var(--hi);padding-bottom:1px;font-weight:700}
#q-choices{display:grid;grid-template-columns:1fr 1fr;gap:9px}
#q-choices.wide{grid-template-columns:1fr}
#q-choices.wide .q-btn{text-align:left;font-size:14px}
.q-btn{font-family:var(--maru);font-weight:700;font-size:15px;padding:12px 8px;border:2px solid var(--kin);border-radius:12px;background:#fff;color:#40241a;cursor:pointer;transition:transform .1s}
.q-btn:active{transform:scale(.97)}
.q-btn.correct{background:var(--take);border-color:var(--take);color:#fff}
.q-btn.wrong{background:#b9b0a4;border-color:#b9b0a4;color:#fff;opacity:.75}
.q-btn:disabled{cursor:default}
#q-expl{margin-top:12px;background:#fff;border-radius:6px;border:1.5px dashed var(--kin);padding:10px 12px;font-size:13.5px;line-height:1.7;display:none}
#q-expl.on{display:block}
#q-tap{
  display:none;margin-top:10px;text-align:center;color:var(--beni);
  font-weight:700;font-size:13.5px;letter-spacing:.15em;
}
#q-tap.on{display:block;animation:blinknext 1s ease-in-out infinite}
#q-score{position:absolute;top:12px;right:58px;z-index:5;background:rgba(0,0,0,.3);color:#fff;border-radius:16px;padding:6px 14px;font-size:13px;font-weight:700;letter-spacing:.1em}

/* 学びの間・ひとくち問題パネル（試しの間と同デザイン） */
#lq-panel{
  position:relative;z-index:6;margin:0 8px 8px;padding:12px 14px;
  background:linear-gradient(#FBF4EA,#F3E6D2);border-radius:18px;border:2px solid var(--kin);
  box-shadow:0 -6px 24px rgba(60,0,0,.45);
  max-height:52%;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;
}
#lq-panel.on{display:block}
#lq-choices{display:grid;grid-template-columns:1fr 1fr;gap:9px}
#lq-expl{margin-top:12px;background:#fff;border-radius:6px;border:1.5px dashed var(--kin);padding:10px 12px;font-size:13.5px;line-height:1.7;display:none}
#lq-expl.on{display:block}
#lq-tap{display:none;margin-top:10px;text-align:center;color:var(--beni);font-weight:700;font-size:13.5px;letter-spacing:.15em}
#lq-tap.on{display:block;animation:blinknext 1s ease-in-out infinite}
@media (max-width:520px){#lq-choices{grid-template-columns:1fr}}

#mute{position:fixed;top:12px;right:12px;z-index:30;background:rgba(0,0,0,.28);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:20px;width:38px;height:38px;font-size:16px;cursor:pointer;line-height:1}

#q-react{display:none;margin-top:10px}
#q-react.on{display:flex;flex-direction:column;gap:7px}
.react-row{display:flex;align-items:flex-start;gap:9px}
.react-row img{width:42px;height:42px;border-radius:50%;border:2.5px solid var(--kin);object-fit:cover;flex:none;background:#fff;box-shadow:0 2px 6px rgba(60,0,0,.3)}
.react-row .rb{
  position:relative;background:#fff;border-radius:12px;padding:7px 11px;font-size:13px;line-height:1.55;
  color:#33201a;font-weight:600;border:1.5px solid var(--kin);flex:1;
}
.react-row.hime .rb{border-color:var(--beni)}
.react-row.nagi .rb{border-color:var(--sora)}
.react-row .rb::before{
  content:'';position:absolute;left:-7px;top:14px;width:0;height:0;
  border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:8px solid var(--kin);
}
.react-row.hime .rb::before{border-right-color:var(--beni)}
.react-row.nagi .rb::before{border-right-color:var(--sora)}
.react-row .who{font-size:10px;font-weight:700;letter-spacing:.1em;margin-bottom:2px}
.react-row.hime .who{color:var(--beni)}
.react-row.nagi .who{color:var(--sora)}
/* 回答後は選択肢を隠してリアクション＋解説だけをコンパクト表示 */
#q-panel.answered #q-choices{display:none}
#q-panel.answered #q-expl{margin-top:8px}


/* クイズ画面：上に問題カード、中央に2人の立ち絵、下に選択肢 */
#scr-quiz .stage{flex:1 1 auto;min-height:180px}
#q-card{max-height:44%;height:auto;top:6px}
#scr-quiz #q-panel{flex:0 0 auto;margin-top:0}
#scr-quiz{overflow:hidden}

/* 結果 */
#scr-result{align-items:center;justify-content:center;text-align:center;padding:20px}
#res-rank{font-family:var(--mincho);font-weight:700;color:#fff;font-size:34px;letter-spacing:.3em;text-shadow:0 2px 12px rgba(90,0,0,.6);margin-bottom:8px}
#res-score{color:#ffe6d5;font-size:18px;font-weight:700;margin-bottom:14px}
#res-msg{background:var(--kinari);border-radius:16px;border:2px solid var(--kin);max-width:480px;padding:16px 18px;font-size:14.5px;line-height:1.9;text-align:left;box-shadow:0 6px 20px rgba(60,0,0,.5)}
.res-faces{display:flex;gap:10px;margin-bottom:12px}
.res-faces img{width:80px;height:80px;border-radius:50%;border:3px solid var(--kin);object-fit:cover;background:#fff}
.res-btns{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap;justify-content:center}

@media (max-width:520px){
  #q-choices{grid-template-columns:1fr}
  #t-main{font-size:clamp(22px,5vh,38px)}
  #t-sub{left:9.5%}
  #t-tag{right:16%;font-size:clamp(10px,2vh,14px)}
  .ch.hime{left:27%;height:min(58%,440px)}
  .ch.nagi{left:75%;height:min(48%,380px)}
  #title-hime{left:32%;height:60%}
  #title-nagi{left:73%;height:52%}
}
</style>
</head>
<body class="shippou">
<div id="app">
<button id="mute" onclick="toggleMute()" aria-label="効果音">♪</button>

  <!-- タイトル -->
  <div class="screen shippou on" id="scr-title">
    <div class="t-band b1"></div><div class="t-band b2"></div>
    <span class="leaf" style="left:8%;animation-duration:13s;animation-delay:0s;font-size:18px">🍁</span><span class="leaf" style="left:24%;animation-duration:17s;animation-delay:4s;font-size:22px">🍁</span><span class="leaf" style="left:46%;animation-duration:15s;animation-delay:8s;font-size:16px">🍁</span><span class="leaf" style="left:63%;animation-duration:19s;animation-delay:2s;font-size:20px">🍁</span><span class="leaf" style="left:81%;animation-duration:14s;animation-delay:6s;font-size:17px">🍁</span><span class="leaf" style="left:93%;animation-duration:16s;animation-delay:10s;font-size:21px">🍁</span>
    <div class="t-vtxt" id="t-quote">思ふべしや、いなや</div>
    <div id="t-tag">姫と空といっしょに、たのしく古典文法</div>
    <img id="title-hime" data-im="hime" src="" alt="紅葉の姫">
    <img id="title-nagi" data-im="nagi" src="" alt="空">
    <div class="t-vtxt" id="t-main">重要助動詞</div>
    <div class="t-vtxt" id="t-sub">紅葉の姫と学ぶ</div>
    <div id="t-menu">
      <button class="t-btn" onclick="goMenu()">学びの間<small>姫の授業をきく（全九帖）</small></button>
      <button class="t-btn" onclick="openQuizSelect()">試しの間<small>10問クイズにちょうせん</small></button>
    </div>
  </div>

  <!-- 講義選択 -->
  <div class="screen shippou" id="scr-menu">
    <button class="back-btn" onclick="sfx('tap');show('scr-title')">◀ 戻る</button>
    <div class="menu-wrap">
      <div class="menu-head">学びの間</div>
      <div class="menu-note">すきな帖からはじめてね。おわった帖には ✿ がつくよ</div>
      <div class="jo-grid" id="jo-grid"></div>
    </div>
  </div>

  <!-- 講義 -->
  <div class="screen shippou" id="scr-lesson">
    <button class="back-btn" onclick="goMenu()">◀ 帖選び</button>
    <div class="stage">
      <img id="ch-h" class="ch hime ch-idle" data-im="hime" src="" alt="紅葉の姫">
      <img id="ch-n" class="ch nagi ch-idle" data-im="nagi" src="" alt="空">
      <div id="card"></div>

/* ================= 効果音 ================= */
let AC=null, muted=false;
function ac(){
  if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function tone(f,d,type,v,when,slide){
  const a=ac(), t=a.currentTime+(when||0);
  const o=a.createOscillator(), g=a.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(f,t);
  if(slide) o.frequency.exponentialRampToValueAtTime(slide,t+d);
  g.gain.setValueAtTime(v||.15,t);
  g.gain.exponentialRampToValueAtTime(.001,t+d);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t+d+.05);
}
function sfx(name){
  if(muted) return;
  try{ ac(); }catch(e){ return; }
  switch(name){
    case 'tap':     tone(660,.06,'sine',.045); break;
    case 'select':  tone(784,.07,'sine',.055); tone(1175,.09,'sine',.04,.06); break;
    case 'card':    tone(420,.14,'sine',.035,0,130); break;
    case 'type':    tone(1150+Math.random()*250,.025,'sine',.012); break;
    case 'correct': [880,1109,1319].forEach((f,i)=>tone(f,.2,'sine',.06,i*.1)); break;
    case 'wrong':   tone(330,.3,'sine',.045,0,262); break;
    case 'joy':     [523,659,784].forEach((f,i)=>tone(f,.18,'sine',.05,i*.09)); break;
    case 'fanfare': [523,659,784,1046].forEach((f,i)=>tone(f,.25,'sine',.06,i*.14));
                    tone(262,1.1,'sine',.03,.2); break;
  }
}

/* ===== BGM（ゆるかわローファイ風・8小節ループ / A major 88BPM） ===== */

/* 進行：Dmaj7→E7→C#m7→F#m7→Bm7→E7→Amaj7→Amaj7 */
const BARS=[

function env(o,g,t,d,v,atk){
  g.gain.setValueAtTime(.0001,t);
  g.gain.linearRampToValueAtTime(v,t+atk);
  g.gain.exponentialRampToValueAtTime(.0001,t+d);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t+d+.05);
}
function pad(f,t,d,v){ /* エレピ風の和音 */
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='triangle'; o.frequency.value=f;
  env(o,g,t,d,v,.05);
}
function bassN(f,t,v,d){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sine'; o.frequency.value=f;
  env(o,g,t,d||1.5,v||.034,.02);
}
let noiseBuf=null;
function hat(t,v){ /* やわらかいシェイカー */
  if(!noiseBuf){
    noiseBuf=AC.createBuffer(1,2205,AC.sampleRate);
    const d=noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  }
  const s=AC.createBufferSource(); s.buffer=noiseBuf;
  const f=AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=6500;
  const g=AC.createGain();
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(.0001,t+.07);
  s.connect(f); f.connect(g); g.connect(AC.destination);
  s.start(t);
}
function pluck(f,t,d,v){ /* カリンバ風：基音＋倍音キラッ */
  [[1,v],[2,v*.22],[3,v*.10]].forEach(([m,vv])=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine'; o.frequency.value=f*m;
    env(o,g,t,d,vv,.006);
  });
}
function playStep(s,t){
  const bar=BARS[(s/8)%8|0];
  if(s%8===0){
    bassN(bar[0],t);
    bar[1].forEach((f,i)=>pad(f,t+i*.012,2.1,.011));
  }
  if(s%8===4){
    bassN(bar[0]*1.5,t,.02,.8); /* 3拍目に5度の軽いベース */
    bar[1].forEach((f,i)=>pad(f,t+i*.008,.8,.006));
  }
  if(s%8===2) pluck(bar[1][2],t,.45,.016);  /* 分散和音のきらめき */
  if(s%8===6) pluck(bar[1][1],t,.45,.014);
  if(s%2===1) hat(t, s%8===7 ? .014 : .009); /* 裏拍のシェイカー */
  const m=MEL[s];
  if(m) pluck(m[0], t+Math.random()*.012, m[1], .045);
}
let bgmTimer=null, bgmStep=0, bgmTime=0;
function schedTick(){
  if(!AC) return;
  const now=AC.currentTime;
  if(bgmTime < now-.2) bgmTime = now+.1;  /* タブ復帰時のズレ補正 */
  while(bgmTime < now+.45){
    if(!muted && AC.state==='running') playStep(bgmStep,bgmTime);
    bgmStep=(bgmStep+1)%STEPS;
    bgmTime+=HALF;
  }
}
function startBGM(){
  if(bgmTimer) return;
  bgmTime = ac().currentTime+.15;
  bgmTimer = setInterval(schedTick,120);
}
function toggleMute(){
  muted=!muted;
  document.getElementById('mute').textContent = muted?'✕':'♪';
  if(!muted) sfx('tap');
}
document.addEventListener('pointerdown', ()=>{ try{ac(); startBGM();}catch(e){} }, {once:true});

let L = null, Lstep = 0, typing = null, fullText = '';

function setMood(el, cls){
  el.classList.remove('ch-idle','ch-talk','ch-joy','ch-oops','ch-enter');
  void el.offsetWidth;
  el.classList.add(cls);
  if(cls!=='ch-idle'){
    el.addEventListener('animationend', function h(){ el.classList.remove(cls); el.classList.add('ch-idle'); el.removeEventListener('animationend',h); });
  }
}
function setSpeaker(sp, mood){
  const active = sp==='n' ? $('#ch-n') : $('#ch-h');

  active.classList.remove('dim'); other.classList.add('dim');

  $('#dlg-name').className = sp==='n' ? 'nagi' : '';

function startLesson(id){
  sfx('select');

  show('scr-lesson');
  setMood($('#ch-h'),'ch-enter'); setMood($('#ch-n'),'ch-enter');
  $('#ch-h').classList.remove('dim'); $('#ch-n').classList.remove('dim');
  $('#card').className=''; $('#card').innerHTML='';
  endLessonQuiz();
  advance();

function typeText(txt, done){
  const box = $('#dlg-text');
  fullText = txt; box.innerHTML='';
  $('#dlg-next').style.visibility='hidden';
  const parts = txt.split(/(<[^>]+>)/g).filter(Boolean);
  let pi=0, ci=0, out='', tc=0;
  clearInterval(typing);
  typing = setInterval(()=>{
    if(pi>=parts.length){ clearInterval(typing); typing=null; $('#dlg-next').style.visibility='visible'; done&&done(); return; }
    const p = parts[pi];
    if(p.startsWith('<')){ out+=p; pi++; ci=0; }
    else{ out+=p[ci]; ci++; tc++; if(tc%4===1) sfx('type'); if(ci>=p.length){pi++;ci=0;} }
    box.innerHTML = out;
  }, 26);
}
function skipType(){
  if(typing){ clearInterval(typing); typing=null; $('#dlg-text').innerHTML=fullText; $('#dlg-next').style.visibility='visible'; return true; }
  return false;
}

function advance(){
  // ひとくち問題の回答待ちは進めない
  if(lqActive && !lqAnswered) return;
  if(skipType()){ sfx('tap'); return; }
  sfx('tap');
  const steps = L.steps;
  Lstep++;
  if(Lstep>=steps.length){ cleared[L.id]=true; goMenu(); return; }
  const st = steps[Lstep];
  $('#dlg-prog').textContent = `${L.name}の帖　${Lstep+1}／${steps.length}`;
  if(st.q){ lessonQuiz(st.q); return; }
  // 通常ステップに戻るときはクイズパネルを畳んでセリフ枠を戻す
  endLessonQuiz();
  if(st.card===null){ $('#card').className=''; }
  else if(st.card){ $('#card').innerHTML = `<div class="card-title">${st.card.title}</div>${st.card.html}`; $('#card').className='on'; sfx('card'); }
  setSpeaker(st.sp||'h', st.mood);
  typeText(st.t);
}

/* 訳を意味の直後に置かず、最低1問あけて挿入する（2段構え） */
function insertYakuWithGap(baseList, yakuList, used){
  // baseList: 訳を含まない土台。yakuList: 差し込みたい訳問題。
  const list = baseList.slice();
  const shuf = a => a.slice().sort(()=>Math.random()-.5);
  shuf(yakuList).forEach(y=>{
    if(used.has(y)) return;
    // ペア意味の位置を探す
    let mi = -1;
    if(y.p) mi = list.findIndex(q=>q.k==='意味' && q.p===y.p);
    // 挿入可能な最小位置：ペア意味があれば その+2、なければ 0
    const minPos = mi>=0 ? mi+2 : 0;
    // minPos以降で、かつ「直前が同じpの意味でない」位置を候補に
    const cands = [];
    for(let pos=minPos; pos<=list.length; pos++){
      const prev = list[pos-1];
      if(prev && prev.k==='意味' && prev.p===y.p) continue; // 直後禁止(念のため)
      cands.push(pos);
    }
    const pos = cands.length ? cands[Math.floor(Math.random()*cands.length)] : list.length;
    list.splice(pos, 0, y); used.add(y);
  });
  return list;
}

/* 最終保証：意味の直後に同じ例文の訳があれば1つ後ろへずらす */
function enforceYakuGap(list){
  let safety = 0;
  let changed = true;
  while(changed && safety++ < 50){
    changed = false;
    for(let i=0;i<list.length-1;i++){
      if(list[i].k==='意味' && list[i].p && list[i+1].k==='訳' && list[i+1].p===list[i].p){
        // i+1 の訳を i+2 と入れ替え（末尾なら前の非ペア問題と入れ替え）
        if(i+2 < list.length){
          const tmp = list[i+1]; list[i+1] = list[i+2]; list[i+2] = tmp;
        } else if(i-1 >= 0){
          const tmp = list[i+1]; list[i+1] = list[i-1]; list[i-1] = tmp;
        }
        changed = true;
      }
    }
  }
  return list;
}

function startQuiz(genre){
  sfx('select');
  genre = genre || 'all';
  const shuf = a => a.slice().sort(()=>Math.random()-.5);
  const pool = genre==='all' ? QUIZ : QUIZ.filter(q=>q.j===genre);
  const used = new Set();
  let base, yakuUse;

  if(genre==='all'){
    // 土台：意味を多め＋活用・接続を少々（訳は含めない）＝7問
    const imi     = shuf(pool.filter(q=>q.k==='意味')).slice(0,5);
    const katsetu = shuf(pool.filter(q=>q.k==='活用'||q.k==='接続')).slice(0,3);
    base = shuf([...imi, ...katsetu]).slice(0,7);
    base.forEach(q=>used.add(q));
    // 差し込む訳：土台の意味とペアのものを優先、足りなければ他の訳
    const paired  = pool.filter(q=>q.k==='訳' && base.some(b=>b.k==='意味'&&b.p===q.p));
    const unpaired= shuf(pool.filter(q=>q.k==='訳' && !paired.includes(q)));
    yakuUse = [...paired, ...unpaired].slice(0,3);
  } else {
    // ジャンル別：意味・活用・接続を土台に、その助動詞の訳を差し込む
    const imi     = shuf(pool.filter(q=>q.k==='意味'));
    const katsetu = shuf(pool.filter(q=>q.k==='活用'||q.k==='接続'));
    base = shuf([...imi, ...katsetu]);
    base.forEach(q=>used.add(q));
    yakuUse = pool.filter(q=>q.k==='訳');
  }

  let list = insertYakuWithGap(base, yakuUse, used);

  // 10問に満たなければ、未使用の問題で補充
  if(list.length < 10){
    const rest = shuf(pool.filter(q=>!used.has(q)));
    let ri=0;
    while(list.length<10 && ri<rest.length){
      const q = rest[ri++];
      // 訳なら安全位置に、その他は末尾に
      if(q.k==='訳'){ list = insertYakuWithGap(list, [q], used); }
      else { list.push(q); used.add(q); }
    }
  }
  list = list.slice(0, Math.min(10, list.length));
  list = enforceYakuGap(list);

  qset = list;
  qi=0; qscore=0;
  show('scr-quiz');
  setMood($('#qch-h'),'ch-enter'); setMood($('#qch-n'),'ch-enter');
  renderQ();
}
function renderQ(){
  answered=false;
  const q = qset[qi];

  $('#q-no').textContent = `第 ${qi+1} 問／全 ${qset.length} 問　〔${q.k}〕`;
  $('#q-text').innerHTML = (q.k==='意味'?`次の傍線部の意味は？<span class="kobun">${q.s}</span>`:q.k==='訳'?`次の現代語訳として正しいものは？<span class="kobun">${q.s}</span>`:`<span style="font-size:16px">${q.s}</span>`)
    + (q.note?`<div style="font-size:12px;color:#9c6b1f;margin-top:4px;padding-bottom:2px">※ ${q.note}</div>`:'');
  const box = $('#q-choices'); box.innerHTML=''; box.className = q.k==='訳' ? 'wide' : '';
  q.c.forEach((c,i)=>{
    const b=document.createElement('button'); b.className='q-btn'; b.textContent=c;
    b.onclick=()=>answer(i,b); box.appendChild(b);
  });
  $('#q-expl').className=''; $('#q-expl').innerHTML='';
  $('#q-react').className=''; $('#q-react').innerHTML='';
  $('#q-panel').classList.remove('answered');
  $('#q-tap').className='';
}
function answer(i,btn){
  if(answered) return; answered=true;
  const q = qset[qi];
  document.querySelectorAll('#q-choices .q-btn').forEach((b,bi)=>{
    b.disabled=true;
    if(bi===q.a) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
  });
  const ok = i===q.a;
  if(ok){ sfx('correct'); qscore++; setMood($('#qch-h'),'ch-joy'); setMood($('#qch-n'),'ch-joy'); }
  else{ sfx('wrong'); setMood($('#qch-h'),'ch-oops'); setMood($('#qch-n'),'ch-oops'); }
  $('#q-score').textContent = `${qscore} 問正解`;
  // 2人のリアクション吹き出し
  const r = ok ? REACT.correct : REACT.wrong;
  $('#q-react').innerHTML =
    `<div class="react-row hime"><img src="${SPK.h.face}" alt=""><div class="rb"><div class="who">紅葉の姫</div>${pick(r.h)}</div></div>`+
    `<div class="react-row nagi"><img src="${SPK.n.face}" alt=""><div class="rb"><div class="who">空</div>${pick(r.n)}</div></div>`;
  $('#q-react').className='on';
  $('#q-expl').innerHTML = `<b style="color:${ok?'var(--take)':'var(--beni)'}">${ok?'正解！':'残念……'}</b>　${q.e}`;
  $('#q-expl').className='on';
  $('#q-panel').classList.add('answered');
  $('#q-tap').textContent = qi===qset.length-1 ? '▼ タップで結果を見る' : '▼ タップで次の問題へ';
  $('#q-tap').className='on';
}
function nextQ(){
  sfx('tap');
  qi++;
  if(qi>=qset.length){ showResult(); return; }
  renderQ();
}
function showResult(){
  show('scr-result');
  sfx('fanfare');
  const r = qscore/qset.length;
  let rank, msg;
  if(r>=0.9){ rank='紫式部級'; msg='<b>姫</b>「あっぱれ！　助動詞はもうあなたの味方ですわ」<br><b>空</b>「すごい……私も追いつけるように頑張ります！」'; }
  else if(r>=0.7){ rank='清少納言級'; msg='<b>姫</b>「なかなかの腕前。間違えた問題の〈接続〉と〈人称〉をもう一度確かめれば、満点も遠くありませんことよ」<br><b>空</b>「一緒に復習しましょう！」'; }
  else if(r>=0.5){ rank='女房見習ひ級'; msg='<b>姫</b>「芽は出ておりますわ。活用表を声に出して唱えるのが上達の近道」<br><b>空</b>「ず・ず・ず・ぬ・ね・まる……ほら、ご一緒に！」'; }
  else{ rank='入内前級'; msg='<b>姫</b>「焦ることはありませんわ。まずは「む」と「けり」の帖から。型さえ覚えれば、点はきっと付いてまいります」<br><b>空</b>「——きっと、だから強意の「ぬ」ですね！　私も最初はボロボロでした。一緒に頑張りましょう」'; }
  $('#res-rank').textContent = rank;
  $('#res-score').textContent = `${qset.length} 問中 ${qscore} 問正解`;
  $('#res-msg').innerHTML = msg;
}
</script>
</body>
</html>
